<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>피싱체커 - 새 메시지 검사</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1f3a60",
                        "secondary": "#2F5D8A",
                        "background-light": "#f6f7f8",
                        "background-dark": "#14181e",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#101418] dark:text-gray-100">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- TopAppBar -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-gray-200 dark:border-gray-800">
<div class="flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-primary dark:text-blue-400" style="font-size: 28px;">shield_with_heart</span>
</div>
<h2 class="text-[#101418] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">🛡️ 피싱체커</h2>
</header>
<main class="flex-1 overflow-y-auto">
<!-- HeadlineText -->
<section class="px-4 pt-6 pb-2">
<h2 class="text-[#101418] dark:text-white tracking-tight text-[28px] font-bold leading-tight">새로운 메시지를<br/>검사하세요</h2>
</section>
<!-- TextField Area -->
<section class="px-4 py-3">
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<textarea class="form-input flex w-full resize-none overflow-hidden rounded-xl text-[#101418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#d4dae2] dark:border-gray-700 bg-white dark:bg-gray-900 min-h-[220px] placeholder:text-[#5c6f8a] p-5 text-base font-normal leading-relaxed" placeholder="의심되는 메시지를 붙여넣으세요"></textarea>
</label>
</div>
</section>
<!-- ButtonGroup -->
<section class="px-4 py-3">
<div class="flex flex-col gap-3 w-full">
<button class="flex items-center justify-center rounded-xl h-14 px-5 bg-secondary text-white text-lg font-bold transition-all active:scale-[0.98]">
<span class="material-symbols-outlined mr-2">content_paste</span>
<span class="truncate">붙여넣기</span>
</button>
<button class="flex items-center justify-center rounded-xl h-14 px-5 bg-primary text-white text-lg font-bold transition-all active:scale-[0.98] shadow-lg shadow-primary/20">
<span class="material-symbols-outlined mr-2">search</span>
<span class="truncate">검사하기</span>
</button>
</div>
</section>
<div class="h-4"></div>
<!-- Recent Activity Section -->
<section class="px-4 pb-10">
<div class="flex items-center justify-between pb-3">
<h3 class="text-[#101418] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">💡 최근 검사한 메시지</h3>
</div>
<!-- Recent Message Card -->
<div class="bg-white dark:bg-gray-900 rounded-xl p-4 border border-gray-100 dark:border-gray-800 shadow-sm flex items-center gap-3">
<div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-red-50 dark:bg-red-900/20 text-red-600">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">report</span>
</div>
<div class="flex-1 min-w-0">
<p class="text-[#101418] dark:text-white font-medium truncate">🔴 bit.ly/xxx 포함 메시지</p>
<p class="text-[#5c6f8a] text-xs mt-0.5">2시간 전 검사 완료</p>
</div>
<span class="material-symbols-outlined text-gray-400">chevron_right</span>
</div>
</section>
</main>
<!-- Bottom Navigation Spacer for Mobile -->
<div class="h-8 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
