<!DOCTYPE html>
<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>피싱체커 - 메인 화면</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#1f3a60",
                "background-light": "#f6f7f8",
                "background-dark": "#14181e",
              },
              fontFamily: {
                "display": ["Public Sans", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="text-primary dark:text-gray-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer" style="font-size: 24px;">menu</span>
</div>
<h2 class="text-primary dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">피싱체커</h2>
<div class="flex w-12 items-center justify-end">
<p class="text-primary dark:text-gray-300 text-sm font-bold leading-normal tracking-[0.015em] shrink-0 cursor-pointer">내역</p>
</div>
</header>
<main class="flex-1 overflow-y-auto pb-24">
<div class="flex flex-col items-center pt-8 pb-4">
<div class="bg-primary/10 dark:bg-primary/30 p-4 rounded-full mb-4">
<span class="material-symbols-outlined text-primary dark:text-blue-400" style="font-size: 48px;">shield_locked</span>
</div>
<h1 class="text-primary dark:text-white tracking-light text-[28px] font-bold leading-tight px-4 text-center">피싱체커</h1>
<p class="text-gray-600 dark:text-gray-400 text-base font-normal leading-normal pb-3 pt-1 px-8 text-center">의심 메시지, 바로 확인하세요</p>
</div>
<div class="px-4 py-3">
<div class="flex flex-col w-full">
<p class="text-primary dark:text-gray-200 text-base font-medium leading-normal pb-2">메시지 내용</p>
<textarea class="form-input flex w-full resize-none overflow-hidden rounded-xl text-gray-900 dark:text-gray-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 min-h-[180px] placeholder:text-gray-400 p-4 text-base font-normal leading-normal shadow-sm" placeholder="의심되는 메시지를 붙여넣으세요"></textarea>
</div>
</div>
<div class="flex flex-col gap-3 px-4 py-4">
<button class="flex items-center justify-center gap-2 bg-primary text-white font-bold py-4 px-6 rounded-xl shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined">search_check</span>
                검사하기
            </button>
<button class="flex items-center justify-center gap-2 bg-primary/10 dark:bg-primary/20 text-primary dark:text-blue-300 font-bold py-3 px-6 rounded-xl active:scale-95 transition-transform border border-primary/20">
<span class="material-symbols-outlined">content_paste</span>
                붙여넣기
            </button>
</div>
<div class="px-4 mt-6">
<div class="bg-white dark:bg-gray-800 p-5 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm">
<div class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-orange-500">lightbulb</span>
<h3 class="font-bold text-gray-800 dark:text-gray-200">팁</h3>
</div>
<p class="text-sm text-gray-600 dark:text-gray-400 mb-2 leading-relaxed">
                    긴급한 문구나 의심스러운 단축 링크를 주의하세요.
                </p>
<div class="bg-background-light dark:bg-gray-900 p-3 rounded-lg border-l-4 border-primary/40 italic text-sm text-gray-500 dark:text-gray-400">
                    "고객님 계정이 정지되었습니다. 본인확인 필요 -&gt; bit.ly/xxx"
                </div>
</div>
</div>
</main>
<nav class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-t border-gray-200 dark:border-gray-800 pb-6 pt-2 flex justify-around items-center">
<div class="flex flex-col items-center gap-1 cursor-pointer">
<span class="material-symbols-outlined text-primary font-bold">home</span>
<span class="text-[10px] font-medium text-primary">홈</span>
</div>
<div class="flex flex-col items-center gap-1 cursor-pointer opacity-50 grayscale hover:opacity-100 hover:grayscale-0 transition-all">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-medium">내역</span>
</div>
<div class="flex flex-col items-center gap-1 cursor-pointer opacity-50 grayscale hover:opacity-100 hover:grayscale-0 transition-all">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-medium">설정</span>
</div>
</nav>

</body></html>
