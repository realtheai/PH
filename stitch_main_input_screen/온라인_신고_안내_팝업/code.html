<!DOCTYPE html>

<html class="light" lang="ko"><head>

<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1f3a60",
                        "background-light": "#f6f7f8",
                        "background-dark": "#14181e",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "Noto Sans KR", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Public Sans", "Noto Sans KR", sans-serif;
        }
        .backdrop-blur-md {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<div class="absolute inset-0 z-0 flex flex-col p-6 opacity-40 grayscale-[0.5]">

</div>
<div class="bg-white rounded-xl p-6 shadow-sm border border-red-100 mb-4">
<div class="flex justify-between items-start mb-4">
<div>
<p class="text-sm text-gray-500">탐지된 위협</p>

</div>
<div class="bg-red-50 p-2 rounded-lg">

</div>

<div class="h-2 w-full bg-gray-100 rounded-full overflow-hidden">
<div class="h-full bg-red-600 w-[95%]"></div>
</div>
</div>
<div class="space-y-4">
<div class="h-24 w-full bg-white rounded-xl shadow-sm border border-gray-100"></div>
<div class="h-24 w-full bg-white rounded-xl shadow-sm border border-gray-100"></div>
</div>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-[#141414]/60 backdrop-blur-md px-6">

<div class="relative w-full max-w-[400px] flex flex-col">

<div class="bg-white dark:bg-background-dark rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">

<div class="flex flex-col items-stretch">
<button class="flex h-6 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-[#d4dae2]"></div>
</button>
</div>

<div class="px-6 pt-4 pb-2">
<h3 class="text-[#101418] dark:text-white tracking-tight text-xl font-bold leading-tight text-center">

                    </h3>
</div>
<!-- BodyText Component -->
<div class="px-8 pt-1 pb-4">

                        <br/>
<span class="inline-block mt-3 px-3 py-1 bg-gray-100 dark:bg-gray-800 rounded-lg text-primary dark:text-blue-400 font-semibold underline underline-offset-4">

                        </span>
<br/>
<span class="inline-block mt-3">이동하시겠습니까?</span>
</p>

</button>
<button class="flex-1 flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-[#162a4a] transition-colors shadow-lg shadow-primary/20">
<span class="truncate">이동하기</span>
</button>
</div>
</div>
<!-- Hint for safety -->
<div class="mt-6 text-center">
<p class="text-white/60 text-xs flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[14px]">verified_user</span>

                </p>
</div>
</div>
</div>
