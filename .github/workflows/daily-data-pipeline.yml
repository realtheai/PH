name: 📊 Daily Phishing Data Pipeline

on:
  # 매일 자동 실행 (UTC 00:00 = KST 09:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 수동 실행 가능
  workflow_dispatch:

jobs:
  # ============================================================
  # 병렬 크롤링 (5개 동시 실행)
  # ============================================================
  
  crawl-naver:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    - run: pip install -r requirements.txt
    - name: 🕷️ 네이버 API 크롤링
      continue-on-error: true
      env:
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: python scripts/daily_naver.py
  
  crawl-google:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    - run: pip install -r requirements.txt
    - name: 🕷️ 구글 뉴스 크롤링
      continue-on-error: true
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: python scripts/daily_google.py
  
  crawl-images:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    - run: pip install -r requirements.txt
    - name: 🕷️ 구글 이미지 크롤링
      continue-on-error: true
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: python scripts/daily_google_images.py
  
  crawl-reddit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    - run: pip install -r requirements.txt
    - name: 🕷️ Reddit 크롤링
      continue-on-error: true
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: python scripts/daily_reddit.py
  
  crawl-international:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    - run: pip install -r requirements.txt
    - name: 🕷️ 해외 뉴스 크롤링
      continue-on-error: true
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: python scripts/daily_international.py
  
  # ============================================================
  # 데이터 처리 (크롤링 완료 후 순차 실행)
  # ============================================================
  
  process-data:
    runs-on: ubuntu-latest
    needs: [crawl-naver, crawl-google, crawl-images, crawl-reddit, crawl-international]
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v3
    
    - name: 🐍 Python 3.11 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 📦 의존성 설치
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    # ============================================================
    # 2단계: 이미지 OCR
    # ============================================================
    
    - name: 🔍 [2/7] 이미지 OCR 처리
      continue-on-error: true
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        python scripts/process_all_images_ocr.py
    
    # ============================================================
    # 3단계: 텍스트 번역
    # ============================================================
    
    - name: 🌐 [3/7] 텍스트 번역 (영어 → 한국어)
      continue-on-error: true
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        python scripts/translate_all_content.py
    
    # ============================================================
    # 4단계: 콘텐츠 분류 (REAL_CASE/NEWS/NOISE)
    # ============================================================
    
    - name: 🏷️ [4/7] 콘텐츠 분류
      continue-on-error: true
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        python scripts/classify_data.py
    
    # ============================================================
    # 5단계: 피싱 유형 분류 (REAL_CASE만)
    # ============================================================
    
    - name: 🎯 [5/7] 피싱 유형 분류
      continue-on-error: true
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        python scripts/classify_phishing_type.py
    
    # ============================================================
    # 6단계: 중복 제거
    # ============================================================
    
    - name: 🧹 [6/7] 중복 제거
      continue-on-error: true
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        python scripts/deduplicate_data.py
    
    # ============================================================
    # 7단계: 임베딩 생성
    # ============================================================
    
    - name: 🧠 [7/7] 벡터 임베딩 생성
      continue-on-error: true
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        python scripts/run_full_embedding_openai.py
    
    # ============================================================
    # 8단계: 완료 알림
    # ============================================================
    
    - name: 🎉 파이프라인 완료
      run: |
        echo "✅ Daily data pipeline completed successfully!"
        echo "📊 Check Supabase dashboard for updated data"
        echo "🧠 Vector embeddings updated for RAG system"
