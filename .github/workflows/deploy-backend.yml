name: Deploy Backend to Production

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  # Job 1: 테스트 및 린팅
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8
      
      - name: Run linting
        working-directory: ./backend
        run: |
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run tests (if test files exist)
        working-directory: ./backend
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --cov=app --cov-report=term
          else
            echo "No tests found, skipping..."
          fi

  # Job 2: Docker 이미지 빌드 및 푸시 (옵션 A)
  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'  # main 브랜치 push 시에만
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/backend:latest
          cache-to: type=inline

  # Job 3: Render.com 배포 트리거 (옵션 B)
  deploy-render:
    name: Deploy to Render.com
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      
      - name: Wait for deployment
        run: sleep 60
      
      - name: Health Check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.API_URL }}/health || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Health check failed with status: $response"
            exit 1
          fi

  # Job 4: Railway.app 배포 (옵션 C)
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: false  # 사용 시 true로 변경
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service backend

  # Job 5: 배포 완료 알림
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build-and-push-docker, deploy-render]
    if: always()
    
    steps:
      - name: Send Slack notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 Backend Deployment ${{ needs.deploy-render.result }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Backend Deployment Status*\n• Commit: ${{ github.sha }}\n• Status: ${{ needs.deploy-render.result }}\n• Branch: ${{ github.ref_name }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Send Discord notification
        if: secrets.DISCORD_WEBHOOK_URL != ''
        run: |
          STATUS="${{ needs.deploy-render.result }}"
          if [ "$STATUS" = "success" ]; then
            COLOR="3066993"
            EMOJI="✅"
          else
            COLOR="15158332"
            EMOJI="❌"
          fi
          
          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$EMOJI Backend Deployment $STATUS\",
                \"description\": \"Commit: \`${{ github.sha }}\`\nBranch: \`${{ github.ref_name }}\`\",
                \"color\": $COLOR,
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

# 환경 변수 (GitHub Secrets에서 관리)
# 
# 필수:
# - OPENAI_API_KEY
# - SUPABASE_URL
# - SUPABASE_SERVICE_ROLE_KEY
# - GOOGLE_API_KEY
# - GOOGLE_SAFE_BROWSING_API_KEY
#
# 배포 관련:
# - RENDER_DEPLOY_HOOK_URL (Render.com 사용 시)
# - RAILWAY_TOKEN (Railway 사용 시)
# - API_URL (Health check용)
#
# 알림 (선택):
# - SLACK_WEBHOOK_URL
# - DISCORD_WEBHOOK_URL
